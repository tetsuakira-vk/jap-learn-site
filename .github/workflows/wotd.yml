name: Word of the Day Email

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC every day (adjust for your timezone)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab for testing

jobs:
  send-wotd:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Send Word of the Day
        run: python .github/scripts/send_wotd.py
        env:
          BREVO_API_KEY:      ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_LIST_ID:      ${{ secrets.BREVO_LIST_ID }}
