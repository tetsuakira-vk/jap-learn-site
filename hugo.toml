baseURL = "https://tetsuakira-vk.github.io/jap-learn-site/"
languageCode = "en-us"
title = "Learn Japanese"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "Learn Japanese"
  description = "Free interactive Japanese learning — hiragana, katakana, kanji, and phrases. Quizzes, reference charts, and study guides."
  keywords = ["Japanese", "Learn Japanese", "Hiragana", "Katakana", "Kanji", "Japanese quiz", "Japanese for beginners"]
  author = "Rob"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
    apple_touch_icon = "favicon.svg"

  [params.homeInfoParams]
    Title = "日本語を学ぼう — Learn Japanese"
    Content = """Welcome! This site is your free companion for learning Japanese from scratch. Work through **hiragana → katakana → kanji → phrases** at your own pace with interactive quizzes and reference charts. Built to go alongside the YouTube channel — bookmark this, come back daily, and you'll be reading Japanese faster than you think."""

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@JapaneseLearning-z2x"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

